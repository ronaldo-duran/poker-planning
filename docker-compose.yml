version: '3.8'

services:
  app:
    build:
      context: .
      target: production
    container_name: poker_app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-poker_planning}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REVERB_APP_ID: ${REVERB_APP_ID:-poker-planning}
      REVERB_APP_KEY: ${REVERB_APP_KEY:-poker-planning-key}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET:-poker-planning-secret}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      BROADCAST_CONNECTION: reverb
      QUEUE_CONNECTION: database
    volumes:
      - app_storage:/var/www/html/storage/app/public
    ports:
      - "80:80"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: poker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-poker_planning}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_storage:
  postgres_data:
